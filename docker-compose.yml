services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    networks:
      - dl-orders-network

  postgres-write:
    image: postgres:17
    container_name: dl-orders-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dl_orders
      - REPLICATION_PASSWORD=${REPLICATION_PASSWORD:-replicator}
    ports:
      - "5432:5432"
    volumes:
      - dl-orders-postgres-write-data:/var/lib/postgresql/data
      - ./docker/postgres-primary/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh
    networks:
      - dl-orders-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-read:
    image: postgres:17
    container_name: dl-orders-postgres-read
    restart: always
    environment:
      - PGDATA=/var/lib/postgresql/data
      - REPLICATION_USER=replicator
      - REPLICATION_PASSWORD=${REPLICATION_PASSWORD:-replicator}
    ports:
      - "5433:5432"
    volumes:
      - dl-orders-postgres-read-data:/var/lib/postgresql/data
      - ./docker/postgres-replica/entrypoint.sh:/entrypoint-replica.sh
    entrypoint: ["sh", "/entrypoint-replica.sh"]
    networks:
      - dl-orders-network
    depends_on:
      postgres-write:
        condition: service_healthy

volumes:
  dl-orders-postgres-write-data:
  dl-orders-postgres-read-data:

networks:
  dl-orders-network:
    driver: bridge
