services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    networks:
      - dl-orders-network

  postgres-write:
    image: postgres:17
    container_name: dl-orders-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dl_orders
    ports:
      - "5432:5432"
    volumes:
      - dl-orders-postgres-write-data:/var/lib/postgresql/data
    networks:
      - dl-orders-network
  postgres-read:
    image: postgres:17
    container_name: dl-orders-postgres-read
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dl_orders
    ports:
      - "5433:5432"
    volumes:
      - dl-orders-postgres-read-data:/var/lib/postgresql/data
    networks:
      - dl-orders-network
    depends_on:
      - postgres-write

volumes:
  dl-orders-postgres-write-data:
  dl-orders-postgres-read-data:

networks:
  dl-orders-network:
    driver: bridge
